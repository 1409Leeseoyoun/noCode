<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="utf-8" />
    <title>데이터룸 서비스</title>
    <meta
      name="description"
      content="기업실사(Due Diligence) 자료를 클라우드 공간에 보관합니다. 높은 접근성, 고도의 보안조치가 강구됩니다."
    />
    <link rel="stylesheet" href="../css/frame_4/globals.css" />
    <link rel="stylesheet" href="../css/frame_4/frame_4.css" />
  </head>
  <body>
    <main class="slide" role="main">
      <img
        class="dataroom-service-bg"
        src="../img/frame_4/dataroom_service_bg.png"
        alt="Dataroom service background showing organized files"
      />
      <button class="frame" type="button" aria-label="Close modal">
        <img class="cancel-icon" src="../img/frame_4/cancel_icon.png" alt="" role="presentation" />
      </button>
      <section class="div">
        <article class="group">
          <header class="group-2">
            <h1 class="secrets-become">Secrets become <br />Insights</h1>
            <p class="due-dlligence">
              기업실사(Due Dlligence) 자료를 클라우드 공간에 보관합니<br />다. 높은 접근성, 고도의 보안조치가
              강구됩니다.
            </p>
          </header>
          <div class="group-3">
            <nav class="frame-2" aria-label="Service features navigation">
              <img class="icon" src="../img/frame_4/icon1.png" alt="Administrator icon" />
              <img class="img" src="../img/frame_4/icon2.png" alt="Participant icon" />
              <img class="icon-2" src="../img/frame_4/icon3.png" alt="Security icon" />
            </nav>
            <div class="group-4">
              <section class="group-7">
                <h2 class="text-wrapper-3">Administrato</h2>
                <p class="p">룸의 오픈, 문서업로드, 이용자초청 및 권한 <br />설정(인쇄, 복사, 다운로드 등)</p>
              </section>
              <section class="group-6">
                <h2 class="text-wrapper-2">Participant</h2>
                <p class="text-wrapper">
                  파일통합 검색, 가독성 높은 전용뷰어, 빠른 <br />정보공유 및 운영자 Q&amp;A 기능
                </p>
              </section>
              <section class="group-5">
                <h2 class="text-wrapper-2">Security</h2>
                <p class="text-wrapper">
                  이중인증, 참여자별 엑서스제어, 파일 트랙킹, <br />워터마크, 로깅메니지먼트 등
                </p>
              </section>
            </div>
          </div>
        </article>
        <a href="#access-service" class="button" role="button">
          <span class="text-wrapper-4">Access Service</span>
          <span class="group-wrapper" aria-hidden="true">
            <img src="../img/frame_4/access_service_arrow.png" class="arrow">
          </span>
        </a>
      </section>
    </main>
  </body>
</html>
